name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure GitHub Pages site (workflow build)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const branch = context.payload.repository.default_branch || 'main';
            try {
              await github.request('GET /repos/{owner}/{repo}/pages', { owner, repo });
              core.info('GitHub Pages site already exists');
            } catch (e) {
              if (e.status !== 404) throw e;
              core.info('Creating GitHub Pages site (build_type=workflow)...');
              try {
                await github.request('POST /repos/{owner}/{repo}/pages', {
                  owner,
                  repo,
                  data: {
                    build_type: 'workflow',
                    source: { branch, path: '/' },
                  },
                });
                core.info('Pages site created');
              } catch (e2) {
                if (e2.status === 409) {
                  core.info('Pages site already exists (409)');
                } else {
                  throw e2;
                }
              }
            }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
